name: gymfit
description: "GymFit - Ứng dụng bán đồ tập gym"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  flutter_svg: ^2.0.0
  
  # State Management
  flutter_riverpod: ^3.3.1
  
  # Navigation
  go_router: ^17.3.0
  
  # Backend
  supabase_flutter: ^2.12.4
  
  # Deep Links
  app_links: ^7.0.0

  # Utilities
  image_picker: ^1.0.0
  intl: ^0.19.0
  uuid: ^4.3.0
  shared_preferences: ^2.2.0
  connectivity_plus: ^6.0.3
  http: ^1.6.0
  crypto: ^3.0.7
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
